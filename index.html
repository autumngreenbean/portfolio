<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="stylesheet" href="styles copy.css"> -->
    <script src="main.js" type="module" defer></script>
    <!-- <script src="animationhandler.js" type="module" defer></script> -->


    <style>
canvas {
    position: absolute; /* Position the canvas at the background */
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1; /* Place canvas behind the folder elements */
}
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .filebox {
            display: flex;
            flex-direction: column;
            gap: 2px;
            position: relative;
            z-index: 1;
        }
        
        .folder {
            position: relative;
            width: 500px;
            height: 300px;
            background-color: #ffffff;
            border: 1px solid #000000;
            border-radius: 5px;
            margin-left: 20px;
            margin-top: -100px;
            transition: transform 0.3s ease, background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        
        .category {
            background-color: #000000;
            border: 1px solid #ffffff;
        }
        
        .tab {
            position: absolute;
            top: -30px;
            left: 15%;
            transform: translateX(-52%);
            background-color: #ffffff;
            border: 1px solid #000000;
            border-bottom: 2px solid #ffffff;
            color: rgb(0, 0, 0);
            padding: 10px 15px;
            font-weight: bold;
            font-size: 10px;
            text-transform: uppercase;
            border-radius: 5px 5px 0px 0px;
            width: 130px;
            text-align: center;
            transition: background-color 0.3s ease, color 0.3s ease, border-bottom 0.3s ease;
        }
        
        .category .tab {
            background-color: #000000;
            color: #ffffff;
            position: absolute;
            top: -33px;
            left: 40%;
            transform: translateX(-52%);
            border: 1px solid #ffffff;
            border-bottom: 2px solid #000000;
        }
        
        .folder:hover,
        .folder:hover .tab,
        .tab:hover,
        .tab:hover .folder {
            background-color: #000000;
            color: white;
            border-bottom: 2px solid #000000;
        }
        
        .folder:not(.category):hover {
            transform: translate(-20px, -20px);
            border: px solid white;
        }
        
        .folder + .folder {
            margin-top: -285px;
        }

        @media (max-width: 480px) {

            body {
                overflow-y:hidden;
                overflow-x:hidden;
            }
            .folder {
            position: relative;
            width: 500px;
            height: 300px;
            background-color: #ffffff;
            border: 1px solid #000000;
            border-radius: 5px;
            margin-left: 350px;
            margin-top: 800px;
            transition: transform 0.3s ease, background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .category {
            background-color: #000000;
            border: 1px solid #ffffff;
        }
        }

/* window */
#form-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    background-color: #f30000;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    overflow: hidden;
    z-index: 9999; /* Ensure the form is above other content */
}

    #form-header {
      /* background-color: rgba(255, 255, 255, 0.4); */
      /* backdrop-filter: blur(10px); */
      color: rgb(0, 0, 0);
      padding: 10px;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #minimize-btn {
      background-color: transparent;
      color: rgb(0, 0, 0);
      cursor: pointer;
    }

    #form-content {
      padding: 20px;
      display: block;
    }

    label {
      font-weight: bold;
      margin-bottom: 0px;
      display: inline-block;
    }

    button {
      padding: 8px;
      /* background-color: #ffffff; */
      color: rgb(0, 0, 0);
      border: none;
      border-radius: 1px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0000005d;
    }

    </style>
</head>
<body>

    <div class="filebox">
        <div class="folder">
            <div class="tab" data-file="ARTIST-BIOGRAPHY.txt">ABOUT</div>
        </div>
        <div class="folder">
            <div class="tab" data-file="CURRICULUM-VITAE.txt">CV & LINKS</div>
        </div>
        <div class="folder category">
            <div class="tab" data-file="Portland Institution of Contemporary Art">PROJECTS</div>
        </div>
        <div class="folder">
            <div class="tab" data-file="UTOPIA-PORTLAND-INSTITUTION-OF-CONTEMPORARY-ART.txt">utopia: PICA</div>
        </div>
        <div class="folder">
            <div class="tab" data-file="SOUND-AND-VIDEO-SIGNAL.wav">synthesis</div>
        </div>
        <div class="folder">
            <div class="tab" data-file="video-work.mpeg">FOOTAGE</div>
        </div>
        <div class="folder">
            <div class="tab" data-file="imagery.png">IMAGES</div>
        </div>
        <div class="folder">
            <div class="tab" data-file="DATA.log">LOG</div>
        </div>
    </div>


</body>
</html>
<script type="module">
    import { makeDraggable } from './makeDraggable.js';
    import { handleMinimize } from './window.js';
    import { updateShapes } from './main.js';  // Import updateShapes

    let zIndexCounter = { current: 1000 }; // Start with a base z-index value

    // Function to fetch and load content dynamically based on the file
    function fetchFileContent(fileName) {
    console.log('Fetching content for:', fileName);

    return fetch('content.json')  // Fetch the JSON file instead of HTML
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch content.json: ' + response.statusText);
            }
            return response.json();  // Parse the JSON file
        })
        .then(contentJson => {
            console.log('Fetched JSON:', contentJson);  // Log the fetched JSON

            // Find the content associated with the fileName
            const content = contentJson[fileName];

            if (content) {
                // If the content exists, return the content to be inserted into the form
                return `
                    <h2>${content.title}</h2>
                    ${content.content}
                `;
            } else {
                // If the content is not found, return a message indicating that
                return `<p>No content found for ${fileName}</p>`;
            }
        })
        .catch(error => {
            console.error('Error fetching content:', error);
            return `<p>Failed to load content for ${fileName}</p>`;
        });
}





    const isMobile = window.innerWidth <= 768; // You can adjust this value as needed for your needs
    let nextLeft, nextTop;
    if (isMobile) {
        // For mobile, use smaller increments or position
        nextLeft = 50; // Initial left position for the first form
        nextTop = 50; // Initial top position for the first form
    } else {
        // For desktop, use the current increment values
        nextLeft = 100; // Initial left position for the first form
        nextTop = 100; // Initial top position for the first form

    }
    
    // Function to create form windows
    function createForm(fileName) {
    let existingForm = document.getElementById(`form-container-${fileName}`);
    if (existingForm) {
        existingForm.style.zIndex = zIndexCounter.current++;
        updateShapes();
        return;  // No need to create a new form if it exists
    }

    const formContainer = document.createElement('div');
    formContainer.id = `form-container-${fileName}`;

       
        // Set styles directly to the form container
        formContainer.style.position = 'absolute';
        formContainer.style.fontWeight = 'bold';
        formContainer.style.top = `${nextTop}px`; // Position form at the current 'top' position
        formContainer.style.left = `${nextLeft}px`; // Position form at the current 'left' position
        formContainer.style.transform = 'translate(0, 0)';
        formContainer.style.width = '300px';
        formContainer.style.borderRadius = '8px';
        formContainer.style.boxShadow = '0 4px 8px rgba(0, 0, 0, 0.2)';
        formContainer.style.overflow = 'hidden';
        formContainer.style.zIndex = zIndexCounter.current++; // New form gets the current z-index
        formContainer.style.backdropFilter = "blur(5px)"; // Apply frosted glass effect

        formContainer.innerHTML = `
            <div id="form-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
                <span id="form-title">${fileName}</span>
                <button id="minimize-btn" style="background-color: transparent; color: rgb(0, 0, 0); cursor: pointer;">-</button>
            </div>
            <form id="form-content" style="padding: 20px; display: block;">
                HI WORLD!!!!!!!!!!!!!!!!!!!!!!!!!!
            </form>
        `;
        document.body.appendChild(formContainer);

// Fetch content from content.html based on the fileName (no modifications)
fetchFileContent(fileName)
        .then(content => {
            console.log(`Inserting content for ${fileName}:`, content);  // Log content before inserting
            formContainer.querySelector('#form-content').innerHTML = content;
        });

// Update shapes, make form draggable, and handle minimize button
updateShapes();
makeDraggable(formContainer, formContainer.querySelector('#form-header'), zIndexCounter);
handleMinimize(formContainer);

nextLeft += 50; // Adjust position for the next form
nextTop += 50;
}

    // Add event listeners to each file/tab
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', (event) => {
            tab.style.transition = 'color 0.2s ease-out'; // Add transition effect for smooth color change
        tab.style.color = 'lightblue';  // Change the text color to light blue

        // Reset color back to default after transition duration
        setTimeout(() => {
            tab.style.color = '';  // Reset to the default color (no inline style)
        }, 300);  // Match the duration of the transition
            const fileName = event.target.getAttribute('data-file');
            
            // Create the form when a tab is clicked
            createForm(fileName);

            // Bring the clicked form to the front by increasing its z-index
            const form = document.getElementById(`form-container-${fileName}`);
            if (form) {
                form.style.zIndex = zIndexCounter.current++;  // Increment and set a higher z-index for the clicked form
            }

            // Ensure the z-index of all other open forms is set to be lower (background)
            document.querySelectorAll('.form-container').forEach(otherForm => {
                if (otherForm !== form) {
                    otherForm.style.zIndex = zIndexCounter.current - 1;  // Lower z-index of other forms to push them to the background
                }
            });
        });
    });
</script>
