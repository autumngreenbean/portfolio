<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEOW!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Full-viewport background image; blurs when a notebook is open -->
    <div id="page-bg" class="page-bg"></div>

    <p>Hi! Welcome to my website. It's currently under construction. <br>The last update was made
        5/21/26. I need to work on this splash page. <br>In the meantime, click on these buttons and see what I've been making!
    </p>
    <!-- Main page content -->
    <div class="page-container"></div>

    <!-- Pop-up Modal -->
    <div id="popup-modal" class="popup-modal hidden">

        <!-- Tiled background: tile.png repeats across the viewport, tiles appear/disappear on resize -->
        <div class="popup-background"></div>

        <!-- Notebook wrapper: notebook.png scales with the viewport.
             Content and tab strip are both positioned inside this wrapper,
             so they move with the notebook image as it resizes. -->
        <div class="notebook-wrapper">
            <img id="notebook-img" class="notebook-img" src="assets/notebook.png" alt="">

<!-- Content area: positioned inside the notebook image via CSS custom properties -->
            <div class="content-area">
                <div id="tab-content" class="tab-content">
                    <h1 class="content-header"></h1>
                    <h2 class="content-subheader"></h2>
                    <p class="content-body"></p>
                </div>
            </div>

            <!-- Tab strip: locked to notebook bottom edge via CSS custom properties -->
            <div id="tab-strip" class="tab-strip">
                <!-- Tabs generated by JavaScript -->
            </div>
        </div>

        <button id="leave-notebook" class="leave-btn" type="button" aria-label="Exit notebook">
            <img class="leave-img" src="assets/leave.png" alt="">
        </button>

    </div>

    <script src="script.js"></script>
</body>
</html>
