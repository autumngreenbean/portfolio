<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog Display</title>
    <style>
   body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: url('your-background-image.jpg'); /* Add a background image or color to ensure the blur works */
}

.container {
    position: fixed;
    /* max-width: 500px; */
    margin: 0 auto;
    padding: 20px;
    overflow-y: auto;
}

.post {
    background-color: rgba(255, 255, 255, 0.2); /* Semi-transparent background */
    backdrop-filter: blur(5px); /* Ensure this has a background to blur */
    padding: 20px;
    border-radius: 10px;  /* Optional for rounded corners */
    transition: opacity 1s, transform 1s; /* Fade-in effect */
}

.post:hover {
    transform: translateY(-5px);
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.post h2 {
    font-size: 1.8rem;
    margin-bottom: 10px;
    color: #333;
}

.post p {
    font-size: 1rem;
    color: #555;
}

.post .title {
    font-weight: bold;
    color: #2c3e50;
}

.post .body {
    color: #7f8c8d;
}

    </style>
</head>
<body>
    <div class="container" id="posts-container">
        <!-- Blog posts will be dynamically inserted here -->
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <script>
      fetch('https://script.google.com/macros/s/AKfycbyMxCpOCiiGXx8DmQXmLithyEqCKYv2p35prOWQCmH6F_Kz6BdF3KeEgyHxqrqK15V66Q/exec')
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
        }
        return response.text();  // Get CSV data as text
      })
      .then(data => {
        console.log('Fetched data (CSV format):', data);
    
        // Manually process and handle CSV parsing
        const rows = processCSV(data);
    
        // Log the parsed CSV data
        console.log('Parsed CSV data:', rows);
    
        // Render posts (if needed)
        const postsContainer = document.getElementById('posts-container');
        
        // Render each row as a post
        rows.slice(1).forEach((row) => {
          const title = row[0];
          const body = row.slice(1).join(", "); // Rebuild body in case of multiple commas
    
          const bodyWithLineBreaks = body.replace(/\n/g, '<br>');
    
          // Create post container
          const post = document.createElement('div');
          post.classList.add('post');
    
          post.innerHTML = `
            <h2 class="title">${title}</h2>
            <p class="body">${bodyWithLineBreaks}</p>
          `;
          
          postsContainer.appendChild(post);
        });
      })
      .catch(error => {
        console.error('Error fetching data:', error);
      });
    
    // Function to process CSV data (split at the first comma for each row)
    function processCSV(data) {
      const rows = [];
      
      // Split data by newlines first
      const lines = data.split('\n');
    
      let currentRow = ''; // Temporary storage for multi-line entries
    
      lines.forEach(line => {
        // Ignore empty lines
        if (!line.trim()) return;
    
        // Check if this line ends with an unclosed quote (indicating multi-line field content)
        if (line.includes('"') && (line.match(/"/g) || []).length % 2 !== 0) {
          currentRow += line + '\n'; // Continue concatenating to currentRow
        } else {
          // If we had a multi-line value, append the current line to it
          if (currentRow) {
            line = currentRow + line;
            currentRow = ''; // Reset after concatenation
          }
    
          // Now, manually parse the line with the splitAtFirstComma logic
          const parts = splitAtFirstComma(line);
    
          // If there are at least two parts (heading and body), add to rows
          if (parts.length > 1) {
            rows.push(parts);
          } else {
            // Handle the case where the row is incomplete (e.g., missing body)
            rows.push([parts[0], '']);
          }
        }
      });
    
      return rows;
    }
    
    // Helper function to split a line at the first comma
    function splitAtFirstComma(line) {
      const firstCommaIndex = line.indexOf(',');
    
      if (firstCommaIndex === -1) {
        return [line];  // Return the whole line if no comma is found
      }
    
      // Split at the first comma and preserve the rest of the string as the body
      const heading = line.substring(0, firstCommaIndex).trim();
      const body = line.substring(firstCommaIndex + 1).trim();
      
      return [heading, body];
    }
    </script>
    
<script type="module" src="/modules/createForm.js"></script>

</body>
</html>
