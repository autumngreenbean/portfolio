<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Folder Stack</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.filebox {
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: relative;
}

.folder {
    position: relative;
    width: 500px;
    height: 300px;
    background-color: #ffffff;
    border: 2px solid #000000;
    border-radius: 5px;
    margin-left: 20px;
    margin-top: -100px;
    transition: transform 0.3s ease, background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
}

.category {
    background-color: #000000;
    border: 1px solid #ffffff;
}

.tab {
    position: absolute;
    top: -34px;
    left: 15%;
    transform: translateX(-52%);
    background-color: #ffffff;
    border: 2px solid #000000;
    border-bottom: 2px solid #ffffff;
    color: rgb(0, 0, 0);
    padding: 10px 15px;
    font-weight: bold;
    font-size: 10px;
    text-transform: uppercase;
    border-radius: 5px 5px 0px 0px;
    width: 130px;
    text-align: center;
    transition: background-color 0.3s ease, color 0.3s ease, border-bottom 0.3s ease;
}

.category .tab {
    background-color: #000000;
    color: #ffffff;
    position: absolute;
    top: -33px;
    left: 40%;
    transform: translateX(-52%);
    border: 1px solid #ffffff;
    border-bottom: 2px solid #000000;
}

.folder:hover,
.folder:hover .tab,
.tab:hover,
.tab:hover .folder {
    background-color: #000000;
    color: white;
    border-bottom: 2px solid #000000;
}

.folder:not(.category):hover {
    transform: translate(-20px, -20px);
    border: px solid white;
}

.folder + .folder {
    margin-top: -285px;
}

    </style>
</head>
<body>
    <div class="filebox">
        <div class="folder">
            <div class="tab">ABOUT</div>
        </div>
        <div class="folder">
            <div class="tab">CV & LINKS</div>
        </div>
        <div class="folder category">
            <div class="tab">PROJECTS</div>
        </div>
        <div class="folder">
            <div class="tab">utopia: PICA</div>
        </div>
        <div class="folder">
            <div class="tab">synthesis</div>
        </div>
        <div class="folder">
            <div class="tab">AUDIO</div>
        </div>
        <div class="folder">
            <div class="tab">PHOTO</div>
        </div>
        <div class="folder">
            <div class="tab">LOG</div>
        </div>
    </div>
</body>
</html>

<!-- folder structure
 
left tab = month
middle white tabs = content
middle black tab = 'projects'/'works'
right tab = year

-->
