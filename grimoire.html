            height: 400px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 350px); /* 2x2 grid */
            grid-template-rows: repeat(2, 300px);

            justify-content: center;

            display: flex;

            align-items: center;

        }

        .grid-item img {

</head>

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function setupQuiz() {
  // Pick a random item pair
  const randomPair = items[Math.floor(Math.random() * items.length)];
  const [firstItem, secondItem] = randomPair;

  document.getElementById('item').textContent = firstItem.split('Sprite-')[1].split('.png')[0];

  // Display the first item in the center box
  const centerBox = document.getElementById('center-box');
  centerBox.innerHTML = `<img src="${firstItem}" alt="Item" />`;

  // Generate a list of all items for the grid, excluding the first item
  let allItems = items.flat(); // Flatten the array to get all items
  allItems = allItems.filter(item => item !== firstItem && item !== secondItem); // Remove both first and second items from grid options

  // Add the second item to the grid
  allItems.push(secondItem);

  // Shuffle the remaining items for randomness
  shuffle(allItems);

  // Ensure we have only 4 grid items, and the second item is unique
  const gridItems = [secondItem, ...allItems.slice(0, 3)]; // Ensure secondItem is unique

  // Shuffle the grid items (now including the second item)
  shuffle(gridItems);

  // Populate the 2x2 grid with items
  const gridContainer = document.getElementById('grid-container');
  gridContainer.innerHTML = ''; // Clear any previous grid

  // Add 4 grid items, including the second item
 // Modify this section where you create the grid items
for (let i = 0; i < 4; i++) {
    const gridItem = document.createElement('div');
    gridItem.classList.add('grid-item');
    gridItem.innerHTML = `<img src="${gridItems[i]}" alt="Item" />`;
    gridItem.addEventListener('click', () => checkMatch(gridItems[i], secondItem, firstItem));  // Pass correctItem and firstItem here
    gridContainer.appendChild(gridItem);
}
}

// Modify the checkMatch function to accept selectedItem, correctItem, and firstItem
function checkMatch(selectedItem, correctItem, firstItem) {
  // Parse the selectedItem, correctItem, and firstItem by extracting the part after 'Sprite-' and before '.png'
  const parsedSelectedItem = decodeURIComponent(selectedItem.split('Sprite-')[1]?.split('.png')[0]);
  const parsedCorrectItem = decodeURIComponent(correctItem.split('Sprite-')[1]?.split('.png')[0]);
  const parsedFirstItem = decodeURIComponent(firstItem.split('Sprite-')[1]?.split('.png')[0]);

  // Ensure parsed values are valid before comparison
  if (parsedSelectedItem && parsedCorrectItem && parsedFirstItem) {
    if (parsedSelectedItem === parsedCorrectItem) {
      alert(`${parsedFirstItem} matches ${parsedCorrectItem}`);
      setupQuiz(); // Reload the quiz with a new random pair
    } else {
      alert("Oops! Try again.");
    }
  } else {
    console.error("Invalid item format: selectedItem:", selectedItem, "correctItem:", correctItem, "firstItem:", firstItem);
  }
}




// Initialize the quiz on page load
