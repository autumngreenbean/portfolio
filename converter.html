<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF to Matrix Converter with All Frames</title>
  <style>
    body { font-family: Arial, sans-serif; }
    #output { margin-top: 20px; }
    canvas { border: 1px solid #ccc; }
    #previewCanvas { margin-top: 20px; border: 1px solid #000; }
    .message { font-weight: bold; }
  </style>
  <!-- Correct URL for gif.js -->
  <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.min.js"></script>
</head>
<body>

<h1>GIF to Matrix Converter</h1>

<input type="file" id="gifInput" accept="image/gif">
<canvas id="canvas" width="48" height="48"></canvas>
<canvas id="previewCanvas" width="48" height="48"></canvas>

<div id="output"></div>
<div id="status"></div>
<div id="frameSelector" style="margin-top: 20px;">
  <label for="frameIndex">Select Frame:</label>
  <select id="frameIndex"></select>
</div>

<script>
  const gifInput = document.getElementById("gifInput");
  const canvas = document.getElementById("canvas");
  const previewCanvas = document.getElementById("previewCanvas");
  const ctx = canvas.getContext("2d");
  const previewCtx = previewCanvas.getContext("2d");
  const outputDiv = document.getElementById("output");
  const statusDiv = document.getElementById("status");
  const frameSelector = document.getElementById("frameSelector");

  let frames = []; // To store all matrices of frames

  function loadGif() {
    const file = gifInput.files[0];
    if (!file) return;

    // Display processing message
    statusDiv.innerHTML = "<span class='message'>Processing...</span>";

    const reader = new FileReader();
    reader.onload = function(event) {
      const gif = new GIF({
        workers: 2,
        quality: 10
      });

      gif.on('parsed', function() {
        processAllFrames(gif.frames);
      });

      gif.load(event.target.result);
    };
    reader.readAsDataURL(file);
  }

  gifInput.addEventListener("change", loadGif);

  function processAllFrames(gifFrames) {
    // Clear previous canvas and preview
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);

    // Process each frame and convert to matrix
    frames = [];
    gifFrames.forEach((frame, index) => {
      const matrix = processFrame(frame);
      frames.push(matrix);
      const option = document.createElement("option");
      option.value = index;
      option.textContent = `Frame ${index + 1}`;
      frameSelector.appendChild(option);
    });

    // Show the first frame's matrix and preview by default
    if (frames.length > 0) {
      displayFrame(0);
    }

    // Display finished message
    statusDiv.innerHTML = "<span class='message'>Processing Finished!</span>";
  }

  function processFrame(frame) {
    // Draw the frame on the canvas
    ctx.putImageData(frame.imageData, 0, 0);

    // Get pixel data from the canvas
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    // Convert the pixels into a matrix
    const matrix = [];
    for (let y = 0; y < canvas.height; y++) {
      const row = [];
      for (let x = 0; x < canvas.width; x++) {
        const idx = (y * canvas.width + x) * 4;
        const r = data[idx];
        const g = data[idx + 1];
        const b = data[idx + 2];
        const a = data[idx + 3];

        const grayscale = (r + g + b) / 3;
        const pixel = grayscale < 128 ? 1 : 0;
        row.push(pixel);
      }
      matrix.push(row);
    }

    return matrix;
  }

  function drawPreview(matrix) {
    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    for (let y = 0; y < matrix.length; y++) {
      for (let x = 0; x < matrix[y].length; x++) {
        const pixel = matrix[y][x];
        previewCtx.fillStyle = pixel === 1 ? 'black' : 'white';
        previewCtx.fillRect(x, y, 1, 1);
      }
    }
  }

  function displayFrame(frameIndex) {
    const matrix = frames[frameIndex];
    // Display the matrix in the output div
    outputDiv.innerHTML = "<pre>" + matrix.map(row => row.join(' ')).join('\n') + "</pre>";

    // Display the preview of the selected frame on the preview canvas
    drawPreview(matrix);
  }

  frameSelector.addEventListener('change', function() {
    const selectedFrame = parseInt(frameSelector.value);
    displayFrame(selectedFrame);
  });
</script>

</body>
</html>
