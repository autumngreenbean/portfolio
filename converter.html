<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF to Matrix Converter (No Library)</title>
  <style>
    body { font-family: Arial, sans-serif; }
    #output { margin-top: 20px; }
    canvas { border: 1px solid #ccc; }
    #previewCanvas { margin-top: 20px; border: 1px solid #000; }
    .message { font-weight: bold; }
  </style>
</head>
<body>

<h1>GIF to Matrix Converter</h1>

<input type="file" id="gifInput" accept="image/gif">
<canvas id="canvas" width="48" height="48"></canvas>
<canvas id="previewCanvas" width="48" height="48"></canvas>

<div id="output"></div>
<div id="status"></div>
<div id="frameSelector" style="margin-top: 20px;">
  <label for="frameIndex">Select Frame:</label>
  <select id="frameIndex"></select>
</div>

<script>
  const gifInput = document.getElementById("gifInput");
  const canvas = document.getElementById("canvas");
  const previewCanvas = document.getElementById("previewCanvas");
  const ctx = canvas.getContext("2d");
  const previewCtx = previewCanvas.getContext("2d");
  const outputDiv = document.getElementById("output");
  const statusDiv = document.getElementById("status");
  const frameSelector = document.getElementById("frameSelector");

  let frames = []; // To store all matrices of frames

  function loadGif() {
    const file = gifInput.files[0];
    if (!file) return;

    // Display processing message
    statusDiv.innerHTML = "<span class='message'>Processing...</span>";

    const reader = new FileReader();
    reader.onload = function(event) {
      const gifData = event.target.result;
      const img = new Image();
      img.onload = function() {
        processGif(img);
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  }

  gifInput.addEventListener("change", loadGif);

  function processGif(image) {
    // Create an off-screen canvas to handle drawing and extracting frames
    const gifWidth = image.width;
    const gifHeight = image.height;
    
    const gifCanvas = document.createElement("canvas");
    const gifCtx = gifCanvas.getContext("2d");

    gifCanvas.width = gifWidth;
    gifCanvas.height = gifHeight;

    // Create an image that holds a copy of the current GIF frame
    gifCtx.drawImage(image, 0, 0);

    // Extracting frame data from the GIF
    const frameData = [];
    const imageData = gifCtx.getImageData(0, 0, gifWidth, gifHeight);
    const data = imageData.data;

    // Convert image data to black/white matrix
    for (let y = 0; y < gifHeight; y++) {
      const row = [];
      for (let x = 0; x < gifWidth; x++) {
        const idx = (y * gifWidth + x) * 4;
        const r = data[idx];
        const g = data[idx + 1];
        const b = data[idx + 2];
        const grayscale = (r + g + b) / 3;
        const pixel = grayscale < 128 ? 1 : 0;
        row.push(pixel);
      }
      frameData.push(row);
    }

    // Add this frame's matrix to the frames array
    frames.push(frameData);

    // Generate frame selector options
    const option = document.createElement("option");
    option.value = frames.length - 1;
    option.textContent = `Frame ${frames.length}`;
    frameSelector.appendChild(option);

    // Show the first frame's matrix and preview by default
    if (frames.length === 1) {
      displayFrame(0);
    }

    // Display finished message
    statusDiv.innerHTML = "<span class='message'>Processing Finished!</span>";
  }

  function drawPreview(matrix) {
    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    for (let y = 0; y < matrix.length; y++) {
      for (let x = 0; x < matrix[y].length; x++) {
        const pixel = matrix[y][x];
        previewCtx.fillStyle = pixel === 1 ? 'black' : 'white';
        previewCtx.fillRect(x, y, 1, 1);
      }
    }
  }

  function displayFrame(frameIndex) {
    const matrix = frames[frameIndex];
    // Display the matrix in the output div
    outputDiv.innerHTML = "<pre>" + matrix.map(row => row.join(' ')).join('\n') + "</pre>";

    // Display the preview of the selected frame on the preview canvas
    drawPreview(matrix);
  }

  frameSelector.addEventListener('change', function() {
    const selectedFrame = parseInt(frameSelector.value);
    displayFrame(selectedFrame);
  });
</script>

</body>
</html>
